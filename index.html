<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width" , initial-scale="1.0" maximum-scale="1.0", user-scalable="no">
    <title>Adventure Days</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!--User Interface Section-->
    <div id="ui">
        <div id="startBtn"></div>
        <div>
            <img id="playerIcon" src="sprites/playerIconPlaceholder.png">
        </div>
        <div id="healthBar">
            <div id="healthBarFill"></div>
        </div>
        <div id="manaBar">
            <div id="manaBarFill"></div>
        </div>
        <div id="xpBar">
            <div id="xpBarFill"></div>
        </div>
        <div id="playerLvl">
            1
        </div>
        <div id="staminaBar">
            <div id="staminaBarFill"></div>
        </div>
        <div id="inventory"></div>
    </div>
    <div id="gameMenu">
        <h2>Menu</h2>
        <button id="toggleMusic">Music On / Off</button>
        <button id="saveBtn">Save Game</button>
        <button id="loadBtn">Load Game</button>
        <button id="closeMenu">Close</button>
    </div>
    <!--Background Tiles Section-->
    <div id="background">

    </div>

    <div id="impassable">

    </div>

    <div id="passable">

    </div>

    <div id="player">

    </div>


    <!--Logic-->
    <script src="scripts.js"></script>
</body>

</html>
